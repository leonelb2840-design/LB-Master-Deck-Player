<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeonelB BPM Deck v3.1</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* 1. Definimos la variable de color global */
        :root {
            --accent: #00ff00;
        }

        body {
            background-color: #050505;
            background-size: cover; /* Para que la imagen de fondo se vea bien */
            background-position: center;
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            border: 4px solid var(--accent);
            box-sizing: border-box;
            transition: border 0.3s ease;
        }

        .deck {
            background: rgba(17, 17, 17, 0.9); /* Un poco de transparencia por si hay fondo */
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px var(--accent);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .visualizer {
            height: 100px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent);
        }

        .bar {
            width: 10px;
            background: var(--accent);
            min-height: 5px;
            box-shadow: 0 0 10px var(--accent);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .custom-section {
            display: flex;
            justify-content: space-around;
            background: #222;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        input[type=range] { width: 100%; accent-color: var(--accent); }
        
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .label-file {
            font-size: 0.7rem;
            border: 1px dashed var(--accent);
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="deck">
        <h1>LB MASTER DECK</h1>
        
        <div class="custom-section">
            <div>
                <label style="font-size: 10px;">COLOR</label><br>
                <input type="color" id="colorPicker" value="#00ff00">
            </div>
            <div>
                <label class="label-file" for="bgFile">🖼️ CAMBIAR FONDO</label>
                <input type="file" id="bgFile" accept="image/*" style="display:none">
            </div>
        </div>

        <div class="visualizer" id="visualizer"></div>

        <div class="controls">
            <input type="file" id="audioFile" accept="audio/*">
            
            <div class="control-group">
                <label>BPM: <span id="speedVal">1.0</span>x</label>
                <input type="range" id="speedRange" min="0.5" max="2.0" step="0.01" value="1.0">
            </div>

            <div class="control-group">
                <label>Volumen: <span id="volVal">100</span>%</label>
                <input type="range" id="volRange" min="0" max="100" value="100">
            </div>

            <button id="playBtn">▶️ Play / Pause</button>
        </div>
        <div id="status" class="info">Ready, fiera...</div>
    </div>

    <script>
        // --- LÓGICA DE PERSONALIZACIÓN ---
        
        // Cambio de color (Idea 1)
        const colorPicker = document.getElementById('colorPicker');
        colorPicker.oninput = (e) => {
            document.documentElement.style.setProperty('--accent', e.target.value);
        };

        // Cambio de fondo (Idea 2)
        const bgFile = document.getElementById('bgFile');
        bgFile.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.body.style.backgroundImage = `url('${url}')`;
            }
        };

        // --- TU LÓGICA DE AUDIO (Igual que antes pero optimizada) ---
        let audioCtx, source, gainNode, analyser;
        let isPlaying = false, audioBuffer = null, startTime = 0, pausedAt = 0;

        const playBtn = document.getElementById('playBtn');
        const speedRange = document.getElementById('speedRange');
        const fileInput = document.getElementById('audioFile');

        const vis = document.getElementById('visualizer');
        for(let i=0; i<20; i++) {
            let b = document.createElement('div');
            b.className = 'bar';
            vis.appendChild(b);
        }

        fileInput.onchange = async (e) => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('status').innerText = "Procesando...";
            const arrayBuffer = await e.target.files[0].arrayBuffer();
            audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            document.getElementById('status').innerText = "¡Mambo listo!";
        };

        function playAudio() {
            if(!audioBuffer) return;
            source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            gainNode = audioCtx.createGain();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            source.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            source.playbackRate.value = speedRange.value;
            gainNode.gain.value = document.getElementById('volRange').value / 100;
            source.start(0, pausedAt);
            startTime = audioCtx.currentTime - pausedAt / source.playbackRate.value;
            isPlaying = true;
            updateVisuals();
        }

        playBtn.onclick = () => {
            if(!audioCtx || !audioBuffer) return;
            if(isPlaying) {
                pausedAt = (audioCtx.currentTime - startTime) * source.playbackRate.value;
                source.stop();
                isPlaying = false;
                playBtn.innerText = "▶️ Play";
            } else {
                playAudio();
                playBtn.innerText = "🛑 Pause";
            }
        };

        speedRange.oninput = (e) => {
            document.getElementById('speedVal').innerText = e.target.value;
            if(source && isPlaying) source.playbackRate.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.1);
        };

        document.getElementById('volRange').oninput = (e) => {
            document.getElementById('volVal').innerText = e.target.value;
            if(gainNode) gainNode.gain.value = e.target.value / 100;
        };

        function updateVisuals() {
            if(!isPlaying) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            const bars = document.querySelectorAll('.bar');
            bars.forEach((bar, i) => {
                bar.style.height = (dataArray[i] / 255) * 100 + "px";
            });
            requestAnimationFrame(updateVisuals);
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
